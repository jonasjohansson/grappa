<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grappa</title>
<meta name="description" content="Drop an image, extract a gradient map from its tones, and export a .cube LUT for After Effects, Premiere, or Resolve.">
<meta property="og:title" content="Grappa">
<meta property="og:description" content="Image to gradient-map LUT.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E🍇%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="drop">Drop, choose, or paste an image &mdash; build a gradient map from its tones</div>
  <input type="file" id="file" accept="image/*" hidden>

  <div class="layout">
  <div id="controls" hidden>
    <div class="row">
      <label>Colors to pick: <span id="nval">6</span></label>
      <input type="range" id="ncolors" min="2" max="16" value="6">
    </div>
    <div class="row">
      <label>Color: <span id="aval">70</span>%</label>
      <input type="range" id="accent" min="0" max="100" value="70">
    </div>
    <div class="row">
      <label>Temperature: <span id="tval">0</span></label>
      <input type="range" id="temp" min="-100" max="100" value="0">
      <span class="hint">&minus;100 cooler &middot; warmer +100 (biases which hue wins each tone)</span>
    </div>
    <div class="row">
      <label>Saturation: <span id="sval">100</span>%</label>
      <input type="range" id="sat" min="0" max="300" value="100">
    </div>
    <div class="row">
      <label>Strength: <span id="bval">100</span>%</label>
      <input type="range" id="blend" min="0" max="100" value="100">
    </div>
    <div class="row">
      <label><input type="checkbox" id="oklab" checked> OKLab blending (smoother mid-tones)</label>
    </div>
    <div class="row">
      <label><input type="checkbox" id="mirror"> Mirror (reflect ramp at midpoint)</label>
    </div>
    <div class="row">
      <label><input type="checkbox" id="keepbw" checked> Preserve black &amp; white (keep highlights/shadows clean)</label>
    </div>
  </div>

  <div id="result" hidden>
    <div class="previews">
      <figure>
        <figcaption>Original</figcaption>
        <canvas id="cOrig"></canvas>
      </figure>
      <figure>
        <figcaption>Graded preview</figcaption>
        <canvas id="cGraded"></canvas>
      </figure>
    </div>

    <figcaption class="fog-title">Fog reference &mdash; procedural neutral fog (black&rarr;white) graded by each variation</figcaption>
    <div class="previews" id="fogRow">
      <figure>
        <figcaption>Warm</figcaption>
        <canvas id="cFogWarm" width="600" height="170"></canvas>
      </figure>
      <figure>
        <figcaption>Balanced</figcaption>
        <canvas id="cFogBal" width="600" height="170"></canvas>
      </figure>
      <figure>
        <figcaption>Cool</figcaption>
        <canvas id="cFogCool" width="600" height="170"></canvas>
      </figure>
    </div>

    <canvas id="gradbar" width="512" height="40"></canvas>
    <div id="stops"></div>
    <div class="row">
      <button id="addStop">+ stop</button>
      <button id="eyedrop">Eyedrop</button>
      <button id="reExtract">Re-extract</button>
      <span class="hint">Eyedrop, then click the image to pick a color the auto-pass missed · drag / arrow keys to move · double-click to recolor · click + Delete to remove</span>
    </div>
    <div class="swatches" id="swatches"></div>

    <div class="row">
      <label>LUT size
        <select id="lutSize">
          <option value="17">17</option>
          <option value="33" selected>33</option>
          <option value="65">65</option>
        </select>
      </label>
      <button id="dlCube">Download .cube LUT</button>
      <button id="dlPng">Download gradient PNG</button>
      <button id="exportVars" title="Bundle warm / balanced / cool hue-bias takes as .cube + .png in one zip">Export 3 variations (zip)</button>
      <button id="copyHex">Copy hex list</button>
      <button id="shareBtn">Copy share link</button>
    </div>
  </div>
  </div>

<input type="color" id="picker" class="picker">
<canvas id="work" hidden></canvas>
<script src="app.js"></script>
</body>
</html>
